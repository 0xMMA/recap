name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Set version in csproj
        shell: pwsh
        run: |
          $csproj = 'src/Recap/Recap.csproj'
          $content = Get-Content $csproj -Raw
          $content = $content -replace '<Version>.*?</Version>', "<Version>${{ steps.version.outputs.VERSION }}</Version>"
          Set-Content $csproj $content

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --no-restore

      - name: Publish
        run: dotnet publish src/Recap -c Release -r win-x64 --self-contained true -o publish

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Download previous release (for delta)
        continue-on-error: true
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}

      - name: Pack with Velopack
        run: >
          vpk pack
          --packId Recap
          --packVersion ${{ steps.version.outputs.VERSION }}
          --packDir publish
          --mainExe Recap.exe
          --noInst

      - name: Create GitHub Release with assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          gh release create "v${VERSION}" \
            --draft \
            --title "Recap v${VERSION}" \
            --generate-notes \
            Releases/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Recap-${{ steps.version.outputs.VERSION }}-win-x64
          path: Releases/*
